version: "3.9"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: estatepro-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: estatepro-backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    volumes:
      - ./docs:/app/docs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: estatepro-frontend
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  chroma_data:
